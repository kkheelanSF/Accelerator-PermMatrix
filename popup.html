<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SFDC Permission Checker</title>
  <style>
    /* ... (keep all your existing CSS) ... */
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 650px;
      padding: 15px;
      color: #333;
    }
    h2 { margin-top: 0; }
    
    /* Top Bar Layout */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      align-items: center;
    }
    input, select {
      padding: 8px;
      border: 1px solid #ddd;
      border-radius: 4px;
      flex: 1;
      min-width: 0; 
    }
    button {
      padding: 8px 20px;
      background-color: #0070d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      white-space: nowrap; 
      flex-shrink: 0; 
    }
    button:hover { background-color: #005fb2; }
    
    #status { margin-bottom: 10px; font-style: italic; color: #666; }
    
    /* Results Styling */
    .section-title { margin: 15px 0 10px; font-weight: bold; border-bottom: 1px solid #eee; padding-bottom: 5px;}
    
    .object-perms-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #f8f9fa;
        padding: 10px;
        border-radius: 4px;
        border: 1px solid #eee;
    }
    .perm-item {
        display: flex;
        align-items: center;
        gap: 8px; 
        font-size: 13px;
    }
    .perm-item strong {
        color: #555;
    }

    input[type="checkbox"] { margin: 0; }
    .checkbox-blue { accent-color: #0070d2; }

    /* Table Styling */
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { padding: 8px; text-align: left; border-bottom: 1px solid #eee; }
    th { background-color: #f4f6f9; }
    
    /* Icon Styling */
    #field-table td:first-child {
        display: flex;
        align-items: center;
    }
    .icon-action {
        text-decoration: none;
        margin-right: 8px;
        font-size: 1.1em;
        cursor: pointer;
        line-height: 1;
    }
    .setup-gear { color: #777; }
    .setup-gear:hover { color: #0070d2; }
    .source-info { color: #0070d2; }

    /* Popover Styling */
    #popover {
      display: none;
      position: fixed;
      background: white;
      border: 1px solid #ccc;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
      padding: 10px;
      z-index: 1000;
      border-radius: 4px;
      max-width: 400px;
    }
    #popover-title { font-weight: bold; margin-bottom: 5px; }
    #popover-table th, #popover-table td { padding: 4px 8px; font-size: 12px; }
    /* NEW CSS FOR SEARCH BAR */
    .field-header-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin: 15px 0 10px;
        border-bottom: 1px solid #eee;
        padding-bottom: 5px;
    }
    .field-header-row .section-title {
        margin: 0;
        border-bottom: none;
        padding-bottom: 0;
    }
    #fieldSearch {
        padding: 6px 10px;
        border: 1px solid #ddd;
        border-radius: 4px;
        font-size: 13px;
        width: 250px;
        display: none; /* Hidden until data loads */
    }
  </style>
</head>
<body>
  <h2>Permission Checker</h2>
  
  <div class="controls">
    <input type="text" id="username" placeholder="Enter Username or Name">
    <select id="sobjectList">
      <option>Loading...</option>
    </select>
    <button id="searchButton">Check</button>
  </div>
  
  <div id="status"></div>

  <div class="section-title">Object Permissions</div>
  <div id="object-results"></div>

  <div class="field-header-row">
      <div class="section-title">Field Permissions</div>
      <input type="text" id="fieldSearch" placeholder="Search Label or API Name...">
  </div>
  <div id="field-results"></div>

  <div id="popover">
    <div id="popover-title"></div>
    <div id="popover-body"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
